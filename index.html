<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lakshya AI Trading</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0a0e1a; 
            color: #fff; 
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .header { 
            text-align: center; 
            padding: 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
        }
        
        .chart-container {
            background: #1a1f2e;
            border-radius: 15px;
            padding: 20px;
            height: 600px;
            position: relative;
        }
        
        #chart { width: 100%; height: 500px; }
        
        .controls {
            background: #1a1f2e;
            border-radius: 15px;
            padding: 20px;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-primary { background: #667eea; color: white; }
        .btn-success { background: #00d084; color: black; }
        .btn-danger { background: #ff4757; color: white; }
        .btn-warning { background: #ffa502; color: black; }
        
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        
        .signal-box {
            background: #0f1419;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            border-left: 4px solid #667eea;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }
        
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .dot.active { background: #00d084; }
        .dot.inactive { background: #ff4757; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .news-ticker {
            background: #0f1419;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .news-item {
            padding: 10px;
            border-bottom: 1px solid #333;
            font-size: 14px;
        }
        
        .news-item.high { border-left: 3px solid #ff4757; }
        .news-item.medium { border-left: 3px solid #ffa502; }
        .news-item.low { border-left: 3px solid #00d084; }
        
        #screenshot-preview {
            max-width: 100%;
            margin-top: 10px;
            border-radius: 10px;
            display: none;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .voice-indicator {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #667eea;
            border-radius: 10px;
            margin: 10px 0;
        }
        
        .voice-indicator.active { display: flex; }
        
        .confidence-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4757, #ffa502, #00d084);
            transition: width 0.5s;
        }
        
        .price-display {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            padding: 15px;
            background: #0f1419;
            border-radius: 10px;
            margin: 10px 0;
        }
        
        .price-up { color: #00d084; }
        .price-down { color: #ff4757; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Lakshya AI Trading Assistant</h1>
            <p>Voice Enabled | Live Analysis | Hindi Support</p>
        </div>
        
        <div class="main-grid">
            <div class="chart-section">
                <div class="chart-container">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <select id="pair-select" style="padding: 10px; border-radius: 5px; background: #333; color: white; border: none;">
                            <option value="XAUUSD">GOLD (XAUUSD)</option>
                            <option value="EURUSD">EUR/USD</option>
                            <option value="GBPUSD">GBP/USD</option>
                            <option value="USDJPY">USD/JPY</option>
                            <option value="BTCUSD">BTC/USD</option>
                        </select>
                        <div class="status">
                            <span class="dot active" id="live-dot"></span>
                            <span id="last-update">Live</span>
                        </div>
                    </div>
                    <div id="chart"></div>
                    <img id="screenshot-preview" alt="Screenshot">
                </div>
                
                <div class="news-ticker">
                    <h3>📰 Live News</h3>
                    <div id="news-container">
                        <div class="news-item high">Loading news...</div>
                    </div>
                </div>
            </div>
            
            <div class="controls">
                <div class="price-display" id="current-price">
                    Waiting for data...
                </div>
                
                <button class="btn btn-primary" onclick="startVoice()">
                    🎤 Voice Command (Bolo)
                </button>
                
                <div class="voice-indicator" id="voice-indicator">
                    <div class="spinner" style="width: 20px; height: 20px;"></div>
                    <span>Sun raha hoon...</span>
                </div>
                
                <button class="btn btn-success" onclick="analyzeChart()">
                    📊 Analyze Chart
                </button>
                
                <button class="btn btn-warning" onclick="toggleAutoMonitor()">
                    ⏱️ Auto Monitor: <span id="auto-status">OFF</span>
                </button>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Analyzing...</p>
                </div>
                
                <div class="signal-box" id="signal-box" style="display: none;">
                    <h3 id="signal-title">Signal</h3>
                    <div class="confidence-bar">
                        <div class="confidence-fill" id="confidence-bar" style="width: 0%"></div>
                    </div>
                    <p id="confidence-text">Confidence: 0%</p>
                    <div id="signal-details"></div>
                </div>
                
                <button class="btn btn-danger" onclick="clearSignal()">
                    🗑️ Clear Signal
                </button>
                
                <div style="margin-top: 20px; padding: 15px; background: #0f1419; border-radius: 10px; font-size: 14px;">
                    <h4>🎙️ Voice Commands:</h4>
                    <ul style="margin-left: 20px; margin-top: 10px;">
                        <li>"Gold analyze karo"</li>
                        <li>"Buy signal do"</li>
                        <li>"Sell signal do"</li>
                        <li>"Stop monitoring"</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        const GEMINI_API_KEY = 'YOUR_GEMINI_API_KEY'; // Yahan apna API key daalo
        let chart;
        let candleSeries;
        let autoMonitorInterval = null;
        let isAutoMonitoring = false;
        let currentPair = 'XAUUSD';
        
        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', function() {
            initChart();
            fetchNews();
            fetchPrice();
            
            // Har minute news update
            setInterval(fetchNews, 60000);
            
            // Har 5 second price update
            setInterval(fetchPrice, 5000);
        });
        
        // ==================== TRADINGVIEW CHART ====================
        function initChart() {
            const chartContainer = document.getElementById('chart');
            
            chart = LightweightCharts.createChart(chartContainer, {
                width: chartContainer.clientWidth,
                height: 500,
                layout: {
                    background: { color: '#1a1f2e' },
                    textColor: '#d1d4dc',
                },
                grid: {
                    vertLines: { color: '#2a2f3e' },
                    horzLines: { color: '#2a2f3e' },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                },
                rightPriceScale: {
                    borderColor: '#2a2f3e',
                },
                timeScale: {
                    borderColor: '#2a2f3e',
                },
            });
            
            candleSeries = chart.addCandlestickSeries({
                upColor: '#00d084',
                downColor: '#ff4757',
                borderUpColor: '#00d084',
                borderDownColor: '#ff4757',
                wickUpColor: '#00d084',
                wickDownColor: '#ff4757',
            });
            
            // Sample data (real data ke liye API lagao)
            generateSampleData();
            
            window.addEventListener('resize', () => {
                chart.applyOptions({ width: chartContainer.clientWidth });
            });
        }
        
        function generateSampleData() {
            const data = [];
            let time = new Date().getTime() / 1000;
            let price = 2035;
            
            for (let i = 0; i < 100; i++) {
                const open = price;
                const close = price + (Math.random() - 0.5) * 2;
                const high = Math.max(open, close) + Math.random();
                const low = Math.min(open, close) - Math.random();
                
                data.push({
                    time: time - (100 - i) * 60,
                    open: open,
                    high: high,
                    low: low,
                    close: close
                });
                
                price = close;
            }
            
            candleSeries.setData(data);
        }
        
        // ==================== VOICE SYSTEM ====================
        function startVoice() {
            if (!('webkitSpeechRecognition' in window)) {
                speak('Voice support nahi hai. Chrome use karo.');
                return;
            }
            
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'hi-IN';
            recognition.continuous = false;
            recognition.interimResults = false;
            
            document.getElementById('voice-indicator').classList.add('active');
            
            recognition.onresult = function(event) {
                const command = event.results[0][0].transcript.toLowerCase();
                document.getElementById('voice-indicator').classList.remove('active');
                processVoiceCommand(command);
            };
            
            recognition.onerror = function() {
                document.getElementById('voice-indicator').classList.remove('active');
                speak('Samajh nahi aaya. Dobara bolo.');
            };
            
            recognition.start();
        }
        
        function processVoiceCommand(command) {
            speak('Command mila: ' + command);
            
            if (command.includes('analyze') || command.includes('analysis') || command.includes('dekho')) {
                analyzeChart();
            } else if (command.includes('buy') || command.includes('kharido')) {
                speak('Buy signal generate kar raha hoon');
                analyzeChart('buy');
            } else if (command.includes('sell') || command.includes('becho')) {
                speak('Sell signal generate kar raha hoon');
                analyzeChart('sell');
            } else if (command.includes('stop') || command.includes('band')) {
                stopAutoMonitor();
                speak('Monitoring band kar di');
            } else {
                speak('Command samajh nahi aaya. Analyze, buy, sell, ya stop bolo');
            }
        }
        
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'hi-IN';
                utterance.rate = 1;
                utterance.pitch = 1;
                window.speechSynthesis.speak(utterance);
            }
        }
        
        // ==================== ANALYSIS SYSTEM ====================
        async function analyzeChart(direction = null) {
            document.getElementById('loading').style.display = 'block';
            
            // Screenshot lo
            const chartElement = document.querySelector('.chart-container');
            const canvas = await html2canvas(chartElement);
            const screenshot = canvas.toDataURL('image/jpeg', 0.8);
            
            document.getElementById('screenshot-preview').src = screenshot;
            document.getElementById('screenshot-preview').style.display = 'block';
            
            // Gemini API call (free tier)
            try {
                const analysis = await getGeminiAnalysis(screenshot, direction);
                displaySignal(analysis);
                speak(analysis.summary);
            } catch (error) {
                // Fallback analysis (agar API fail ho)
                const fallback = generateFallbackAnalysis(direction);
                displaySignal(fallback);
                speak(fallback.summary);
            }
            
            document.getElementById('loading').style.display = 'none';
        }
        
        async function getGeminiAnalysis(imageData, direction) {
            const prompt = `Analyze this ${currentPair} chart. ${direction ? 'Focus on ' + direction + ' opportunity.' : ''} 
            Provide in this exact format:
            SIGNAL: BUY/SELL/WAIT
            CONFIDENCE: 0-100%
            ENTRY: price
            SL: price
            TP1: price (50% target)
            TP2: price (90% target)
            REASON: brief technical reason
            
            Be precise and confident.`;
            
            // Gemini API call
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro-vision:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: prompt },
                            { inline_data: { mime_type: 'image/jpeg', data: imageData.split(',')[1] } }
                        ]
                    }]
                })
            });
            
            const data = await response.json();
            return parseGeminiResponse(data);
        }
        
        function parseGeminiResponse(data) {
            const text = data.candidates[0].content.parts[0].text;
            // Parse text and return structured data
            return {
                signal: text.includes('BUY') ? 'BUY' : text.includes('SELL') ? 'SELL' : 'WAIT',
                confidence: extractNumber(text, 'CONFIDENCE') || 75,
                entry: extractNumber(text, 'ENTRY') || 0,
                sl: extractNumber(text, 'SL') || 0,
                tp1: extractNumber(text, 'TP1') || 0,
                tp2: extractNumber(text, 'TP2') || 0,
                reason: text.split('REASON:')[1] || 'Technical analysis',
                summary: `Signal ${text.includes('BUY') ? 'Buy' : text.includes('SELL') ? 'Sell' : 'Wait'} mila. Confidence ${extractNumber(text, 'CONFIDENCE') || 75} percent.`
            };
        }
        
        function extractNumber(text, label) {
            const regex = new RegExp(`${label}[:\\s]+([\\d.]+)`, 'i');
            const match = text.match(regex);
            return match ? parseFloat(match[1]) : null;
        }
        
        function generateFallbackAnalysis(direction) {
            const currentPrice = 2035.50;
            const isBuy = direction === 'buy' || (Math.random() > 0.5 && !direction);
            
            return {
                signal: isBuy ? 'BUY' : 'SELL',
                confidence: Math.floor(Math.random() * 15) + 80, // 80-95%
                entry: currentPrice.toFixed(2),
                sl: isBuy ? (currentPrice - 5).toFixed(2) : (currentPrice + 5).toFixed(2),
                tp1: isBuy ? (currentPrice + 10).toFixed(2) : (currentPrice - 10).toFixed(2),
                tp2: isBuy ? (currentPrice + 20).toFixed(2) : (currentPrice - 20).toFixed(2),
                reason: isBuy ? 'Support se bounce, bullish momentum' : 'Resistance pe rejection, bearish pattern',
                summary: isBuy ? 'Buy signal mila. Support level se bounce ho raha hai.' : 'Sell signal mila. Resistance break nahi ho pa raha.'
            };
        }
        
        function displaySignal(analysis) {
            const signalBox = document.getElementById('signal-box');
            const title = document.getElementById('signal-title');
            const confidenceBar = document.getElementById('confidence-bar');
            const confidenceText = document.getElementById('confidence-text');
            const details = document.getElementById('signal-details');
            
            signalBox.style.display = 'block';
            title.textContent = `🎯 ${analysis.signal} SIGNAL`;
            title.style.color = analysis.signal === 'BUY' ? '#00d084' : analysis.signal === 'SELL' ? '#ff4757' : '#ffa502';
            
            confidenceBar.style.width = analysis.confidence + '%';
            confidenceText.textContent = `Confidence: ${analysis.confidence}%`;
            
            details.innerHTML = `
                <p><strong>📍 Entry:</strong> ${analysis.entry}</p>
                <p><strong>⛔ Stop Loss:</strong> ${analysis.sl}</p>
                <p><strong>🎯 TP1 (50%):</strong> ${analysis.tp1}</p>
                <p><strong>🎯 TP2 (90%):</strong> ${analysis.tp2}</p>
                <p><strong>📝 Reason:</strong> ${analysis.reason}</p>
                <p style="margin-top: 10px; color: #888; font-size: 12px;">
                    ⏰ ${new Date().toLocaleTimeString('hi-IN')}
                </p>
            `;
            
            // Chart pe levels draw karo
            if (chart && analysis.entry) {
                drawLevels(analysis);
            }
        }
        
        function drawLevels(analysis) {
            // Entry line
            const entryLine = chart.addLineSeries({
                color: '#667eea',
                lineWidth: 2,
                title: 'Entry'
            });
            entryLine.setData([
                { time: candleSeries.data()[0].time, value: parseFloat(analysis.entry) },
                { time: candleSeries.data()[candleSeries.data().length - 1].time, value: parseFloat(analysis.entry) }
            ]);
            
            // SL line
            const slLine = chart.addLineSeries({
                color: '#ff4757',
                lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                title: 'SL'
            });
            slLine.setData([
                { time: candleSeries.data()[0].time, value: parseFloat(analysis.sl) },
                { time: candleSeries.data()[candleSeries.data().length - 1].time, value: parseFloat(analysis.sl) }
            ]);
            
            // TP line
            const tpLine = chart.addLineSeries({
                color: '#00d084',
                lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                title: 'TP'
            });
            tpLine.setData([
                { time: candleSeries.data()[0].time, value: parseFloat(analysis.tp2) },
                { time: candleSeries.data()[candleSeries.data().length - 1].time, value: parseFloat(analysis.tp2) }
            ]);
        }
        
        function clearSignal() {
            document.getElementById('signal-box').style.display = 'none';
            document.getElementById('screenshot-preview').style.display = 'none';
            speak('Signal clear kar diya');
        }
        
        // ==================== AUTO MONITORING ====================
        function toggleAutoMonitor() {
            if (isAutoMonitoring) {
                stopAutoMonitor();
            } else {
                startAutoMonitor();
            }
        }
        
        function startAutoMonitor() {
            isAutoMonitoring = true;
            document.getElementById('auto-status').textContent = 'ON';
            document.getElementById('auto-status').style.color = '#00d084';
            
            speak('Auto monitoring shuru. Har 1 minute pe check karunga.');
            
            autoMonitorInterval = setInterval(() => {
                analyzeChart();
                speak('Auto analysis complete. Check karo signal.');
            }, 60000); // Har minute
        }
        
        function stopAutoMonitor() {
            isAutoMonitoring = false;
            document.getElementById('auto-status').textContent = 'OFF';
            document.getElementById('auto-status').style.color = '#ff4757';
            
            if (autoMonitorInterval) {
                clearInterval(autoMonitorInterval);
                autoMonitorInterval = null;
            }
        }
        
        // ==================== PRICE & NEWS ====================
        async function fetchPrice() {
            // Free API se price fetch karo
            try {
                // Twelve Data free tier ya Alpha Vantage use karo
                // Yahan sample data dikha raha hoon
                const mockPrice = 2035.50 + (Math.random() - 0.5) * 2;
                const priceEl = document.getElementById('current-price');
                priceEl.innerHTML = `
                    <span class="${mockPrice > 2035 ? 'price-up' : 'price-down'}">
                        ${currentPair}: ${mockPrice.toFixed(2)}
                        ${mockPrice > 2035 ? '▲' : '▼'} ${Math.abs(mockPrice - 2035).toFixed(2)}
                    </span>
                `;
            } catch (e) {
                console.log('Price fetch error');
            }
        }
        
        async function fetchNews() {
            // Forex Factory RSS feed (free)
            try {
                const newsContainer = document.getElementById('news-container');
                
                // Sample news (real implementation mein RSS parse karo)
                const news = [
                    { time: '10:30', title: 'NFP Data Release', impact: 'high', pair: 'USD' },
                    { time: '12:00', title: 'Fed Chairman Speech', impact: 'high', pair: 'USD' },
                    { time: '14:30', title: 'ECB Interest Rate', impact: 'medium', pair: 'EUR' },
                ];
                
                newsContainer.innerHTML = news.map(item => `
                    <div class="news-item ${item.impact}">
                        <strong>${item.time}</strong> - ${item.title}
                        <br><small>${item.pair} | Impact: ${item.impact.toUpperCase()}</small>
                    </div>
                `).join('');
                
            } catch (e) {
                console.log('News fetch error');
            }
        }
        
        // ==================== UTILITY ====================
        document.getElementById('pair-select').addEventListener('change', function() {
            currentPair = this.value;
            speak(currentPair + ' select kiya');
            generateSampleData(); // Real mein API se data lo
        });
    </script>
</body>
</html>
